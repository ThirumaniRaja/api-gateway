server:
  port: 8080

spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/apigateway}

gateway:
  auth:
    jwt-secret: ${JWT_SECRET:replace-this-with-a-long-secret-for-prod}
    jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_PER_MINUTE:100}
    burst-capacity: ${RATE_LIMIT_BURST_CAPACITY:100}

