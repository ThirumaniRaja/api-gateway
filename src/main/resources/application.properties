# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/apigateway}

# Gateway Authentication Configuration
gateway.auth.jwt-secret=${JWT_SECRET:replace-this-with-a-long-secret-for-prod}
gateway.auth.jwt-expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

# Gateway Rate Limiting Configuration
gateway.rate-limit.requests-per-minute=${RATE_LIMIT_PER_MINUTE:100}
gateway.rate-limit.burst-capacity=${RATE_LIMIT_BURST_CAPACITY:100}
